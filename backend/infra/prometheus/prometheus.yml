global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Métricas da própria API FastAPI (endpoint /metrics)
  - job_name: "ludoteca_api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: "/metrics"

  # Auto-monitoramento do Prometheus
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
